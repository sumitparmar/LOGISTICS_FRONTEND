<header class="main-header">
    <div class="container">

        <!-- Logo Section -->
        <div class="logo">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 12H6L9 5L13 19L16 12H22" stroke="#ff7a00" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>

            <span class="logo-text">PULSE Logistics</span>
        </div>

        <!-- Navigation -->
        <nav class="nav-links">
            <a routerLink="/app/dashboard" routerLinkActive="active">Home</a>
            <a routerLink="/app/pricing" routerLinkActive="active">Pricing</a>
            <a routerLink="/track" routerLinkActive="active">Track Order</a>
            <a routerLink="/app/about" routerLinkActive="active">About Us</a>
            <a routerLink="/app/contact" routerLinkActive="active">Contact</a>
        </nav>

        <!-- Logout Button -->
        <button class="logout-btn" (click)="logout()">Logout</button>
    </div>
</header>
