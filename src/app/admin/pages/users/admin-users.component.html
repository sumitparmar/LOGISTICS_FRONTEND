<div class="users">

    <!-- Title -->
    <h2 class="users-title">Users</h2>

    <!-- Content Wrapper -->
    <div class="users-content">

        <!-- Card -->
        <div class="users-card">

            <!-- Controls -->
            <div class="users-controls">

                <app-table-controls [page]="page" [totalPages]="totalPages" (pageChange)="onPageChange($event)"
                    (searchChange)="onSearchChange($event)">
                </app-table-controls>


                <select #statusSelect (change)="onFilterChange(statusSelect.value)">
                    <option value="">All</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>


                <button *ngIf="permissionService.has('users.create')" class="primary-btn" (click)="goToCreate()">
                    + Add User
                </button>

            </div>




            <!-- Data Table -->
            <app-data-table [columns]="columns" [data]="users">
            </app-data-table>
            <!-- NAME TEMPLATE -->
            <ng-template #nameTemplate let-user>
                <div class="user-info">
                    <div class="avatar">
                        {{ user.name.charAt(0) }}
                    </div>
                    <span>{{ user.name }}</span>
                </div>
            </ng-template>

            <!-- STATUS TEMPLATE -->
            <ng-template #statusTemplate let-user>
                <span class="status" [ngClass]="user.isActive ? 'active' : 'inactive'">
                    {{ user.isActive ? 'Active' : 'Inactive' }}
                </span>
            </ng-template>

            <!-- ACTIONS TEMPLATE -->
            <ng-template #actionsTemplate let-user>
                <div class="actions">

                    <lucide-icon *ngIf="permissionService.has('users.update')" name="edit"
                        (click)="onEdit(user); $event.stopPropagation()">
                    </lucide-icon>

                    <lucide-icon *ngIf="permissionService.has('users.update')"
                        [name]="user.isActive ? 'user-x' : 'user-check'"
                        [title]="user.isActive ? 'Deactivate user' : 'Activate user'" class="action-icon"
                        (click)="onToggleStatus(user); $event.stopPropagation()">
                    </lucide-icon>

                </div>
            </ng-template>


            <!-- ROLE TEMPLATE -->
            <ng-template #roleTemplate let-user>

                <!-- Only for admin users -->
                <div *ngIf="user.role === 'admin' && permissionService.has('users.update'); else noRole"
                    class="role-cell">
                    <select [(ngModel)]="user.adminRoleId" (ngModelChange)="onRoleChange(user, $event)">
                        <option [ngValue]="null">Super Admin</option>

                        <option *ngFor="let role of roles" [ngValue]="role._id">
                            {{ role.name }}
                        </option>

                    </select>

                </div>

                <!-- Non-admin -->
                <ng-template #noRole>
                    <span>—</span>
                </ng-template>

            </ng-template>



            <!-- Empty State -->
            <div *ngIf="users.length === 0" class="empty-state">
                No users found
            </div>

        </div>

    </div>

</div>

<!-- Confirm Dialog -->

<app-confirm-dialog [visible]="showConfirm" [title]="selectedUser?.isActive ? 'Deactivate User' : 'Activate User'"
    [message]="
    (selectedUser?.isActive
      ? 'Are you sure you want to deactivate '
      : 'Are you sure you want to activate ') + selectedUser?.name + '?'
  " (confirm)="onConfirmDelete()" (cancel)="onCancelDelete()">
</app-confirm-dialog>
