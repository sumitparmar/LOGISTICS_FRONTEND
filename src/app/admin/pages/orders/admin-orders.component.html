<div class="orders-container">

    <!-- Header -->
    <div class="orders-header">
        <h2 class="page-title">Orders</h2>
    </div>

    <!-- Card -->
    <div class="orders-card">
        <div class="bulk-actions" *ngIf="
    selectedOrders.size > 0 &&
    (
      permissionService.has('orders.update') ||
      permissionService.has('orders.delete')
    )
  ">
            <span>
                {{ selectedOrders.size }} selected
                <small *ngIf="selectedOrders.size > orders.length">
                    (across pages)
                </small>
            </span>

            <button class="clear-btn" (click)="clearSelection()"
                [disabled]="isBulkCancelling || isBulkUpdating || isExportingFromModal">
                Clear
            </button>


            <!-- STATUS DROPDOWN -->
            <select *ngIf="permissionService.has('orders.update')" #bulkSelect
                (change)="onBulkStatusChange(bulkSelect.value, bulkSelect)" [disabled]="isBulkUpdating">
                <option value="">Update Status</option>
                <option value="ASSIGNED">Assigned</option>
                <option value="PICKED_UP">Picked Up</option>
                <option value="IN_TRANSIT">In Transit</option>
                <option value="DELIVERED">Delivered</option>
            </select>

            <!-- CANCEL -->
            <button *ngIf="permissionService.has('orders.delete')" (click)="bulkCancel()" [disabled]="isBulkCancelling">
                {{ isBulkCancelling ? 'Cancelling...' : 'Cancel Selected' }}
            </button>

        </div>

        <div class="table-controls">

            <!-- TOP ROW -->
            <div class="controls-wrapper">

                <!-- LEFT SIDE -->
                <div class="controls-left">

                    <app-table-controls [page]="page" [totalPages]="totalPages" (pageChange)="onPageChange($event)"
                        (searchChange)="onSearchChange($event)">
                    </app-table-controls>

                    <div class="advanced-filters">

                        <input type="date" [(ngModel)]="fromDate" (change)="onFilterChange()" />

                        <input type="date" [(ngModel)]="toDate" (change)="onFilterChange()" />

                        <select [(ngModel)]="selectedProvider" (change)="onFilterChange()">
                            <option value="">All Providers</option>
                            <option value="borzo">Borzo</option>
                            <option value="porter">Porter</option>
                        </select>

                    </div>

                </div>

                <!-- RIGHT SIDE -->
                <div class="controls-right">
                    <button *ngIf="permissionService.has('orders.update')" class="export-btn" (click)="confirmExport()"
                        [disabled]="loading || isExporting || isExportingFromModal || !orders.length">
                        {{ (isExporting || isExportingFromModal) ? 'Exporting...' : 'Export CSV' }}
                    </button>
                </div>

            </div>

            <!-- SECOND ROW -->
            <div class="status-filters">

                <button class="filter" [class.active]="selectedStatus === 'ALL'" [disabled]="loading"
                    (click)="filterByStatus('ALL')">
                    All ({{ statusCounts.ALL }})
                </button>

                <button class="filter" [class.active]="selectedStatus === 'CREATED'" [disabled]="loading"
                    (click)="filterByStatus('CREATED')">
                    Pending ({{ statusCounts.CREATED }})
                </button>

                <button class="filter" [class.active]="selectedStatus === 'IN_PROGRESS'" [disabled]="loading"
                    (click)="filterByStatus('IN_PROGRESS')">
                    In Progress ({{ statusCounts.IN_PROGRESS }})
                </button>

                <button class="filter" [class.active]="selectedStatus === 'DELIVERED'" [disabled]="loading"
                    (click)="filterByStatus('DELIVERED')">
                    Delivered ({{ statusCounts.DELIVERED }})
                </button>

                <button class="filter" [class.active]="selectedStatus === 'CANCELLED'" [disabled]="loading"
                    (click)="filterByStatus('CANCELLED')">
                    Cancelled ({{ statusCounts.CANCELLED }})
                </button>

            </div>

        </div>

        <!-- LOADING -->
        <div *ngIf="loading" class="skeleton-table">
            <div class="skeleton-row header">
                <div *ngFor="let col of columns" class="skeleton-cell"></div>
            </div>

            <div class="skeleton-row" *ngFor="let i of [1,2,3,4,5,6,7]">
                <div *ngFor="let col of columns" class="skeleton-cell"></div>
            </div>
        </div>



        <!-- TABLE -->
        <app-data-table class="orders-table" [columns]="columns" [data]="orders" [sortBy]="sortBy"
            [sortOrder]="sortOrder" (sort)="onSort($event)" (rowClick)="onRowClick($event)">
        </app-data-table>

        <!-- EMPTY STATE -->
        <div *ngIf="!loading && orders.length === 0" class="no-data">
            No orders found
        </div>
        <ng-template #selectTemplate let-order let-isHeader="isHeader">
            <!-- HEADER CHECKBOX -->
            <input *ngIf="
    isHeader &&
    (
      permissionService.has('orders.update') ||
      permissionService.has('orders.delete')
    )
  " type="checkbox" [checked]="isAllSelectableChecked()" (click)="toggleSelectAll(); $event.stopPropagation()" />

            <!-- ROW CHECKBOX -->
            <input *ngIf="
    !isHeader &&
    (
      permissionService.has('orders.update') ||
      permissionService.has('orders.delete')
    )
  " type="checkbox" [checked]="selectedOrders.has(order._id)"
                [disabled]="order.status === 'DELIVERED' || order.status === 'CANCELLED'"
                (click)="toggleSelection(order); $event.stopPropagation()" />
        </ng-template>


        <!-- STATUS TEMPLATE -->
        <ng-template #statusTemplate let-order>
            <span class="status" [ngClass]="getStatusClass(order.status)">{{ formatStatus(order.status) }}
            </span>
        </ng-template>

        <!-- ACTIONS TEMPLATE -->
        <ng-template #actionsTemplate let-order>
            <div class="actions">

                <!-- STOP ROW CLICK PROPAGATION -->
                <lucide-icon *ngIf="permissionService.has('orders.update')" name="edit"
                    (click)="onEdit(order); $event.stopPropagation()">
                </lucide-icon>

                <lucide-icon *ngIf="permissionService.has('orders.delete')" name="trash"
                    [class.disabled]="order.status === 'CANCELLED' || order.status === 'DELIVERED'"
                    (click)="(order.status !== 'CANCELLED' && order.status !== 'DELIVERED') && onDelete(order); $event.stopPropagation()">
                </lucide-icon>

            </div>
        </ng-template>

    </div>

    <app-confirm-dialog [visible]="showConfirm" title="Confirm Action" [message]="getConfirmMessage()"
        [loading]="isExportingFromModal" (confirm)="onConfirmDelete()" (cancel)="onCancelDelete()">
    </app-confirm-dialog>

</div>
