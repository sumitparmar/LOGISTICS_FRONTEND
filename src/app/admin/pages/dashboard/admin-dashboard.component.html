<div class="dashboard" *ngIf="!isLoading && stats; else loadingTpl">

    <div class="dashboard-header">
        <h2 class="dashboard-title">Dashboard</h2>

        <div class="range-filter">
            <button [class.active]="selectedRange === 'today'" (click)="changeRange('today')">
                Today
            </button>

            <button [class.active]="selectedRange === 'week'" (click)="changeRange('week')">
                Week
            </button>

            <button [class.active]="selectedRange === 'month'" (click)="changeRange('month')">
                Month
            </button>
        </div>
    </div>

    <!-- KPI CARDS -->
    <div class="dashboard-cards">

        <app-kpi-card title="Total Users" [value]="stats.totalUsers" [growth]="stats.usersChange"
            [subtitle]="getComparisonText()" icon="users" variant="users"></app-kpi-card>

        <app-kpi-card title="Total Orders" [value]="stats.totalOrders" [growth]="stats.ordersChange"
            [subtitle]="getComparisonText()" icon="shopping-cart" variant="orders"></app-kpi-card>

        <app-kpi-card title="Revenue" [value]="stats.revenue" [growth]="stats.revenueChange"
            [subtitle]="getComparisonText()" icon="dollar-sign" variant="revenue"></app-kpi-card>

    </div>

    <!-- CHART -->
    <div class="chart-card">
        <div class="chart-header">
            <h3>Sales Overview</h3>
        </div>

        <canvas *ngIf="lineChartData" baseChart [data]="lineChartData" [options]="lineChartOptions"
            [type]="'line'"></canvas>

        <div *ngIf="!lineChartData" class="no-data">
            No sales data available
        </div>
    </div>

</div>

<ng-template #loadingTpl>
    <div class="dashboard-skeleton">

        <!-- HEADER -->
        <div class="skeleton-header">
            <div class="skeleton-title"></div>
            <div class="skeleton-filters">
                <div class="skeleton-btn"></div>
                <div class="skeleton-btn"></div>
                <div class="skeleton-btn"></div>
            </div>
        </div>

        <!-- KPI CARDS -->
        <div class="skeleton-cards">
            <div class="skeleton-card" *ngFor="let i of [1,2,3]"></div>
        </div>

        <!-- CHART -->
        <div class="skeleton-chart"></div>

    </div>
</ng-template>
