<table class="data-table">

    <thead>
        <tr>
            <th *ngFor="let col of columns" (click)="onSort(col); $event.stopPropagation()"
                [class.sortable]="col.sortable">
                <span>{{ col.label }}</span>

                <!-- SORT ICON -->
                <span *ngIf="col.sortable" class="sort-icon">
                    <ng-container *ngIf="sortBy === col.key">
                        {{ sortOrder === 'asc' ? '↑' : '↓' }}
                    </ng-container>
                    <ng-container *ngIf="sortBy !== col.key">
                        ↕
                    </ng-container>
                </span>
            </th>
        </tr>
    </thead>

    <tbody>

        <!-- EMPTY STATE -->
        <tr *ngIf="!data || data.length === 0">
            <td [attr.colspan]="columns.length" class="empty">
                No data available
            </td>
        </tr>

        <!-- DATA ROWS -->
        <tr *ngFor="let row of data; trackBy: trackByFn" class="clickable-row">
            <td *ngFor="let col of columns" (click)="onRowClick(row)">
                <!-- CUSTOM TEMPLATE -->
                <ng-container *ngIf="col.template; else defaultCell">
                    <ng-container *ngTemplateOutlet="col.template; context: { $implicit: row }">
                    </ng-container>
                </ng-container>

                <!-- DEFAULT CELL -->
                <ng-template #defaultCell>
                    {{ row[col.key] }}
                </ng-template>

            </td>

        </tr>

    </tbody>

</table>
