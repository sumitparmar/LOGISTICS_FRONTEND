<div class="track-page">

    <!-- PAGE TITLE -->
    <h1 class="page-title">Track Your Order</h1>

    <!-- SEARCH CARD -->
    <div class="track-card">

        <div class="search-row">
            <input type="text" placeholder="Enter Order ID" [(ngModel)]="orderId" (input)="orderId = orderId.trim()" />

            <button class="primary" (click)="trackOrder()" [disabled]="loading">
                Track
            </button>
        </div>

        <div class="actions-row">
            <button class="cancel" (click)="cancel()">Cancel</button>
        </div>

        <div class="error" *ngIf="error">
            {{ error }}
        </div>

    </div>

    <!-- ORDER DETAILS CARD -->
    <div class="details-card" *ngIf="order">

        <div class="details-header">
            <div>
                <h3>Order #{{ order._id }}</h3>
            </div>

            <span class="status-badge" [ngClass]="order.status?.toLowerCase()">
                {{ order.status }}
            </span>
        </div>

        <!-- ADDRESSES -->
        <div class="address-block">
            <label>Pickup Address</label>
            <p>{{ order.pickup?.address }}</p>
        </div>

        <div class="address-block">
            <label>Drop Address</label>
            <p>{{ order.drop?.address }}</p>
        </div>

        <!-- META -->
        <div class="meta-grid">
            <div>
                <label>Vehicle</label>
                <p>
                    {{ vehicleMap[order.vehicleTypeId || order.vehicle?.type] || 'Unknown Vehicle' }}
                </p>
            </div>

            <div>
                <label>Delivery Type</label>
                <p>{{ order.deliveryType }}</p>
            </div>

            <div>
                <label>Price</label>
                <p>₹{{ order.pricing?.amount }}</p>
            </div>
        </div>

        <!-- TIMELINE -->
        <div class="timeline" *ngIf="order.statusHistory?.length">
            <div class="step" *ngFor="let step of statusSteps" [class.done]="isStepDone(step)">
                {{ step.replace('_', ' ') }}
            </div>

        </div>
        <!-- ACTIONS -->
        <div class="actions">
            <button class="primary" (click)="viewLiveTracking()">
                View Live Tracking
            </button>
        </div>

    </div>

</div>
