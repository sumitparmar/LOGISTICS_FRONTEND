<div class="login-page">

    <header class="top-header">
        <div class="logo">MoveKart logistics</div>
        <nav>
            <a>Home</a>
            <a>Pricing</a>
            <a>Track Order</a>
            <a>About Us</a>
            <a>Contact</a>
        </nav>
    </header>

    <section class="hero">

        <div class="layout-container">

            <div class="hero-left layout-left">

                <h1 class="page-title">Login</h1>

                <div class="login-card">

                    <div class="mode-switch">
                        <button type="button" [class.active]="loginMode === 'BUSINESS'"
                            (click)="switchMode('BUSINESS')">
                            Business Login
                        </button>

                        <button type="button" [class.active]="loginMode === 'INDIVIDUAL'"
                            (click)="switchMode('INDIVIDUAL')">
                            Individual Login
                        </button>
                    </div>

                    <form *ngIf="loginMode === 'BUSINESS'" [formGroup]="businessForm" (ngSubmit)="submitBusiness()">

                        <div class="input-group">
                            <input type="email" placeholder="Email" formControlName="email" />
                        </div>

                        <div class="input-group">
                            <input type="password" placeholder="Password" formControlName="password" />
                        </div>

                        <a class="forgot">Forgot password?</a>

                        <button type="submit" [disabled]="loading">
                            {{ loading ? 'Logging in...' : 'Login' }}
                        </button>

                        <p class="switch">
                            Don’t have an account?
                            <a routerLink="/auth/register">Register</a>
                        </p>
                    </form>

                    <div *ngIf="loginMode === 'INDIVIDUAL'">

                        <form *ngIf="otpStep === 'PHONE'" [formGroup]="phoneForm" (ngSubmit)="sendOtp()">

                            <div class="input-group">
                                <input type="text" placeholder="Phone Number" formControlName="phone" />
                            </div>

                            <button type="submit" [disabled]="loading">
                                {{ loading ? 'Sending OTP...' : 'Send OTP' }}
                            </button>
                        </form>

                        <form *ngIf="otpStep === 'OTP'" [formGroup]="otpForm" (ngSubmit)="verifyOtp()">

                            <div class="input-group">
                                <input type="text" placeholder="Enter OTP" formControlName="otp" />
                            </div>

                            <button type="submit" [disabled]="loading">
                                {{ loading ? 'Verifying...' : 'Verify OTP' }}
                            </button>

                            <p class="switch otp-switch">
                                Didn’t receive OTP?
                                <a class="change-phone" (click)="otpStep = 'PHONE'">Change phone</a>
                            </p>
                        </form>

                    </div>

                    <div class="error-message" *ngIf="errorMessage">
                        {{ errorMessage }}
                    </div>

                </div>

            </div>

            <div class="hero-image layout-right">
                <img src="assets/images/rider.png" />
            </div>

        </div>

    </section>

    <footer class="footer">
        <div>© 2026 MoveKart logistics. All rights reserved.</div>
    </footer>

</div>
