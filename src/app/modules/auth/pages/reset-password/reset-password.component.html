<div class="hero">

    <div class="layout-container">

        <div class="hero-left layout-left">

            <h1 class="page-title">Reset Password</h1>

            <div class="login-card">

                <form [formGroup]="form" (ngSubmit)="onSubmit()">

                    <!-- New Password -->
                    <div class="input-group">
                        <input type="password" placeholder="New Password" formControlName="password" />
                    </div>

                    <!-- Confirm Password -->
                    <div class="input-group">
                        <input type="password" placeholder="Confirm Password" formControlName="confirmPassword" />
                    </div>

                    <!-- Validation: mismatch -->
                    <small class="error-message" *ngIf="form.errors?.['mismatch'] && form.touched">
                        Passwords do not match
                    </small>

                    <!-- Validation: required -->
                    <small class="error-message" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
                        Password must be at least 6 characters
                    </small>

                    <!-- Submit -->
                    <button type="submit" [disabled]="form.invalid || loading">
                        {{ loading ? 'Resetting...' : 'Reset Password' }}
                    </button>

                    <p class="switch">
                        Back to
                        <a routerLink="/auth/login">Login</a>
                    </p>

                </form>

                <!-- Success -->
                <div class="success-message" *ngIf="successMessage">
                    {{ successMessage }}
                </div>

                <!-- Error -->
                <div class="error-message" *ngIf="errorMessage">
                    {{ errorMessage }}
                </div>

            </div>

        </div>

        <!-- Right Image -->
        <div class="hero-image layout-right">
            <img src="assets/images/rider.png" />
        </div>

    </div>

</div>
